<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hubexo — Where Each Team Stands</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0b2545;
  --navy-2:#123a6b;
  --blue:#2f6fd0;
  --blue-lt:#eaf1fc;
  --gold:#e0a526;
  --green:#1f8a5f;
  --green-lt:#e6f4ee;
  --red:#c0392b;
  --red-lt:#fbebe9;
  --amber:#b8791a;
  --amber-lt:#fdf3e3;
  --slate:#5b6b80;
  --line:#e3e8ef;
  --bg:#f5f7fa;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy);-webkit-font-smoothing:antialiased}

/* ---------- SIDEBAR ---------- */
#sidebar{position:fixed;top:0;left:0;width:250px;height:100vh;background:var(--navy);color:#fff;padding:26px 16px;transition:width .22s ease;overflow:hidden;z-index:50}
#sidebar.collapsed{width:66px}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;white-space:nowrap}
.brand-mark{min-width:34px;height:34px;border-radius:9px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--navy);font-size:15px}
.brand-text{font-weight:600;font-size:15px;letter-spacing:.2px}
#sidebar.collapsed .brand-text,#sidebar.collapsed .navlabel{opacity:0;pointer-events:none}
.navlink{display:flex;align-items:center;gap:13px;padding:13px 12px;border-radius:10px;color:#c7d6ea;text-decoration:none;font-size:14.5px;font-weight:500;margin-bottom:5px;white-space:nowrap;transition:background .15s,color .15s}
.navlink:hover{background:rgba(255,255,255,.09);color:#fff}
.navlink.active{background:var(--blue);color:#fff}
.navlink svg{min-width:20px}
.navlabel{transition:opacity .15s}
#toggle{position:absolute;bottom:22px;left:16px;background:rgba(255,255,255,.1);border:0;color:#c7d6ea;width:34px;height:34px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
#toggle:hover{background:rgba(255,255,255,.2);color:#fff}

/* ---------- LAYOUT ---------- */
#main{margin-left:250px;padding:34px 40px 70px;transition:margin-left .22s ease}
#main.wide{margin-left:66px}
h1{font-size:21px;font-weight:600;color:var(--navy-2);margin-bottom:22px}
h2{font-size:16px;font-weight:600;margin:34px 0 14px}

/* ---------- SCOREBOARD ---------- */
.score{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px;margin-bottom:12px}
.score-card{border-radius:16px;padding:22px;color:#fff;cursor:pointer;border:0;text-align:left;font-family:inherit;transition:transform .15s}
.score-card:hover{transform:translateY(-3px)}
.score-card.on{outline:3px solid var(--navy);outline-offset:3px}
.score-num{font-size:38px;font-weight:700;line-height:1}
.score-lbl{font-size:14px;font-weight:500;margin-top:6px;opacity:.95}
.s-ahead{background:linear-gradient(135deg,#1f8a5f,#2fb37c);box-shadow:0 8px 22px rgba(31,138,95,.3)}
.s-track{background:linear-gradient(135deg,#2f6fd0,#5a95e8);box-shadow:0 8px 22px rgba(47,111,208,.3)}
.s-behind{background:linear-gradient(135deg,#c0392b,#e0574a);box-shadow:0 8px 22px rgba(192,57,43,.3)}
.s-ramp{background:linear-gradient(135deg,#b8791a,#e0a526);box-shadow:0 8px 22px rgba(184,121,26,.3)}

/* ---------- FILTERS ---------- */
.filters{background:#fff;border-radius:14px;padding:18px;display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:24px}
.fgroup{display:flex;flex-direction:column;gap:6px}
.fgroup label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--slate)}
select{font-family:inherit;font-size:14px;font-weight:500;padding:11px 14px;border:1.5px solid var(--line);border-radius:9px;background:#fff;color:var(--navy);min-width:190px;cursor:pointer}
select:focus{outline:none;border-color:var(--blue)}
.toggle{display:flex;align-items:center;gap:9px;background:var(--blue-lt);border:1.5px solid transparent;border-radius:9px;padding:11px 15px;cursor:pointer;font-size:14px;font-weight:500;user-select:none}
.toggle.on{background:var(--navy);color:#fff}
.toggle input{width:16px;height:16px;accent-color:var(--gold);cursor:pointer}
.clear{margin-left:auto;background:none;border:0;color:var(--blue);font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;padding:11px 4px}

/* ---------- TEAM CARDS ---------- */
.teams{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:18px}
.team{background:#fff;border-radius:16px;padding:24px;border-left:7px solid var(--slate)}
.team.ahead{border-left-color:var(--green)}
.team.behind{border-left-color:var(--red)}
.team.track{border-left-color:var(--blue)}
.team.ramp{border-left-color:var(--amber)}
.team-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:4px}
.team-name{font-size:19px;font-weight:600}
.team-lead{font-size:13.5px;color:var(--slate);font-weight:500}
.pill{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;padding:6px 12px;border-radius:20px;white-space:nowrap}
.p-ahead{background:var(--green-lt);color:var(--green)}
.p-behind{background:var(--red-lt);color:var(--red)}
.p-track{background:var(--blue-lt);color:var(--blue)}
.p-ramp{background:var(--amber-lt);color:var(--amber)}
.metric{background:var(--bg);border-radius:10px;padding:13px 15px;margin:16px 0 14px}
.metric-num{font-size:23px;font-weight:700}
.metric-sub{font-size:12.5px;color:var(--slate);font-weight:500;margin-top:2px}
.evidence{list-style:none;display:flex;flex-direction:column;gap:9px}
.evidence li{font-size:14px;line-height:1.5;padding-left:16px;position:relative;color:#33465e}
.evidence li:before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--blue)}
.evidence b{color:var(--navy)}
.roster{margin-top:18px;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:12.5px;font-weight:500;padding:6px 11px;border-radius:8px;background:var(--bg);color:#33465e;display:flex;align-items:center;gap:6px}
.chip.ess{background:var(--blue-lt);color:var(--navy-2)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--slate)}
.dot.ahead{background:var(--green)}
.dot.behind{background:var(--red)}
.dot.ramp{background:var(--amber)}
.dot.track{background:var(--blue)}
.star{color:var(--gold);font-size:11px}
.empty{background:#fff;border-radius:16px;padding:50px;text-align:center;color:var(--slate);font-size:15px}
.legend{display:flex;flex-wrap:wrap;gap:18px;margin-top:26px;font-size:13px;color:var(--slate)}
.legend span{display:flex;align-items:center;gap:7px}
@media(max-width:820px){#sidebar{width:66px}#sidebar .brand-text,#sidebar .navlabel{opacity:0}#main{margin-left:66px;padding:24px 18px 60px}}
</style>
</head>
<body>

<nav id="sidebar">
  <div class="brand"><div class="brand-mark">L</div><div class="brand-text">Hubexo × Lushin</div></div>
  <a class="navlink active" href="index.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
    <span class="navlabel">Where teams stand</span></a>
  <a class="navlink" href="sessions/essentials.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span class="navlabel">Essentials schedule</span></a>
  <a class="navlink" href="sessions/kam-sprint.html">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>
    <span class="navlabel">Craig — KAM sprint</span></a>
  <button id="toggle" aria-label="Collapse navigation">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
</nav>

<div id="main">
  <h1>Where each team stands</h1>

  <div class="score" id="score"></div>

  <div class="filters">
    <div class="fgroup"><label for="fLeader">Leader</label>
      <select id="fLeader"><option value="">All leaders</option></select></div>
    <div class="fgroup"><label for="fTeam">Team</label>
      <select id="fTeam"><option value="">All teams</option></select></div>
    <div class="fgroup"><label for="fStatus">Status</label>
      <select id="fStatus">
        <option value="">Ahead and behind</option>
        <option value="ahead">Ahead</option>
        <option value="track">On track</option>
        <option value="behind">Behind</option>
        <option value="ramp">Ramping</option>
      </select></div>
    <label class="toggle" id="essWrap"><input type="checkbox" id="fEss"> In Essentials now</label>
    <button class="clear" id="clear">Reset filters</button>
  </div>

  <div class="teams" id="teams"></div>

  <div class="legend">
    <span><span class="dot ahead"></span> Ahead of plan</span>
    <span><span class="dot track"></span> On track</span>
    <span><span class="dot behind"></span> Behind plan</span>
    <span><span class="dot ramp"></span> Ramping or blocked</span>
    <span><span class="star">★</span> In Essentials now</span>
  </div>
</div>

<script>
/* =========================================================================
   ADD OR EDIT A TEAM: add one object to this array. Nothing else to change.
   status: 'ahead' | 'track' | 'behind' | 'ramp'
   people: { n: name, s: status, ess: true if in Essentials, note: coaching note }
   ========================================================================= */
const TEAMS = [
 {
  team:"Key Accounts (KAM)", leader:"Craig Fuss", status:"ahead",
  metric:"200% of goal", metricSub:"$500K+ in upsells last month against a $110K monthly target",
  evidence:[
    "Craig's group <b>outperformed every other team</b> last month, carried by familiar products and one deal close to $100K.",
    "Upsell focus is set: <b>Monitor and Construction Wire</b> first. Quest and Pantera carry higher barriers.",
    "The constraint is cross-product selling — product experts still hold the accounts instead of handing reps the reins.",
    "Four-session sprint starts next Wednesday to fix outreach confidence."
  ],
  people:[
    {n:"Jon Kane", s:"ahead", note:"$90K closed in two months against a $30K monthly target. Only rep with a real referral network."},
    {n:"Susan Young", s:"track", note:"Monitor expert. In the sprint."},
    {n:"Kayla Shabahz", s:"track", note:"Quest expert. In the sprint."},
    {n:"Nicole Leclair", s:"ramp", note:"New and energetic, least experienced. In the sprint — needs urgency and outreach confidence."},
    {n:"Kevin Drake", s:"ramp", note:"API product lead. Moving to self-directed selling: $12.5K monthly target, 10% commission."},
    {n:"Nicole Crader", s:"ramp", ess:true, note:"Active prospecting ramp-up underway with Alex."}
  ]
 },
 {
  team:"Enterprise / Reseller", leader:"Craig Fuss", status:"ahead",
  metric:"$155K closed", metricSub:"$240K goal — plus $120K, $40K and $24K in late-stage pipeline",
  evidence:[
    "<b>John Burns closed at $155K</b> with renewal upside. Advent Health at $120K is through security and sitting in legal redlines.",
    "Reseller deals with <b>Calibrate ($40K) and Sitewise ($24K)</b> are live; Walmart is in final legal.",
    "Real drag is internal: a new sales-data approval process and slow CRO responses are stalling signatures.",
    "Lead generation is the soft spot — the pipeline is strong at the top of the list and thin behind it."
  ],
  people:[
    {n:"Alex Deloach", s:"ahead", note:"Carrying the number. Needs air cover on the approval red tape and the Walmart legal thread."},
    {n:"Salesperson 1 (Sarah)", s:"ramp", note:"Coaching on pipeline building, upfront contracts, clear next steps. Confidence still building."},
    {n:"Salesperson 2", s:"ramp", note:"Onboarding."}
  ]
 },
 {
  team:"Contractors Mid Market", leader:"Harry", status:"ahead",
  metric:"Momentum building", metricSub:"Early closes and the first referral wins are landing",
  evidence:[
    "<b>Devon Semler is closing deals early</b> in his ramp; Sabrina Brackett landed referral success.",
    "Team adopted the CAPS framework and the <b>five-minute placeholder meeting</b> after demos to cut ghosting.",
    "Open issue: the <b>90-day client handover</b> to success teams isn't clear, so reps drop engagement post-sale.",
    "Shift underway from chasing referral outcomes to a consistent monthly ask."
  ],
  people:[
    {n:"Devon Semler", s:"ahead", ess:true, note:"Closing early. Missed the first two Essentials sessions — recordings sent."},
    {n:"Sabrina Brackett", s:"ahead", ess:true, note:"Referral success. Working trial-to-commitment trade-offs."},
    {n:"Joseph Shelton", s:"track", ess:true, note:"Documenting pre-demo qualification questions and objections."},
    {n:"Michael Ciccarelli", s:"track", ess:true, note:"Steady."},
    {n:"Nicole Speck", s:"track", ess:true, note:"Steady."}
  ]
 },
 {
  team:"AE Strategic (NBS / Latira)", leader:"Darren Kerr", status:"track",
  metric:"~200 AIA leads", metricSub:"$27K monthly target — conversion speed is the whole game",
  evidence:[
    "About <b>200 leads engaged at AIA</b> with first meetings booked. The job now is converting them fast.",
    "Pipeline stages were standardized and milestone criteria defined, which removed a lot of forecast ambiguity.",
    "Strategy is a <b>30-day cycle on smaller firms</b> (11–50 employees) instead of the usual 90–120 days.",
    "Latira is the risk: strong product, weak US architect adoption — 100 US projects in three years against 60,000 global users."
  ],
  people:[
    {n:"Mark Barretto", s:"track", ess:true, note:"Owns pipeline stages and the ROI calculator in demos. Needs upfront-contract reps."},
    {n:"Brittany Moss", s:"track", ess:true, note:"Working a demo held for leadership review. Documenting 'end if not yes' objections."},
    {n:"Josh Struletz", s:"ramp", ess:true, note:"Ramping on AIA warm leads and internal product knowledge."}
  ]
 },
 {
  team:"Strategic Contractors", leader:"Darren Kerr", status:"behind",
  metric:"$26K pipeline", metricSub:"Down from a normal $120K–$150K",
  evidence:[
    "Pipeline collapsed from <b>$120K–$150K to roughly $26K</b>. Inbound dried up and monthly sales are following it down.",
    "Reps built for warm inbound are being pushed into cold outbound — cycles stretch, confidence drops.",
    "<b>CRM data quality</b> is blocking prospecting; reps burn hours verifying leads by hand.",
    "ICP confusion after the role changes means reps aren't sure who to target.",
    "Team dynamics are still good — they're supporting each other and waiting on leadership to move on lead flow."
  ],
  people:[
    {n:"Greg Madia", s:"behind", note:"Calling the top 100 despite messaging problems. ZoomInfo export broken before subscription expiry."},
    {n:"Joshua Puvogel", s:"track", ess:true, note:"Custom cold outreach with tailored emails, documenting responses. Working the tech-stack training."},
    {n:"Andrew Quintana", s:"ramp", ess:true, note:"ZoomInfo access still not activated."},
    {n:"Mike Strickland", s:"ramp", ess:true, note:"Surfacing the lead-quality and CRM cleanup issues to Kyle and management."},
    {n:"Jen Mack", s:"ramp", ess:true, note:"Onboarding. Committed to 250 calls, 50 emails, 50 LinkedIn per week on self-generated leads."},
    {n:"Glen Jeris", s:"track", note:"No new signal this window."},
    {n:"Jason Brandschain", s:"track", note:"No new signal this window."}
  ]
 },
 {
  team:"Strategic BPM", leader:"Darren Kerr", status:"behind",
  metric:"Both reps locked out", metricSub:"ZoomInfo access unresolved — outbound can't start",
  evidence:[
    "<b>Kevin can't get past login verification and Megan's account expired.</b> The prospecting motion is stalled at the tool.",
    "ICP is now defined — state-level targeting, NAICS codes, 51–250 employees — but nobody can act on it yet.",
    "HubSpot integration is down until renewal, so imports risk duplicating existing contacts.",
    "Once access lands: saved filters, 'Likely to Engage' and Scoops give this team a real trigger-based motion."
  ],
  people:[
    {n:"Kevin Braun", s:"behind", note:"Login verification failing. Hard to engage in training — needs direct coaching on ZoomInfo and email."},
    {n:"Megan Sanders", s:"behind", note:"Subscription expired, working support. Self-described overthinker — needs volume, not more planning."},
    {n:"Chip Kappen", s:"track", note:"No new signal this window."}
  ]
 },
 {
  team:"Mid Market BPM", leader:"Harry", status:"behind",
  metric:"72% of leads → 7 reps", metricSub:"Uneven distribution and declining lead quality",
  evidence:[
    "<b>72% of leads are going to 7 reps.</b> Workloads are lopsided and quality has dropped — prospects don't respond.",
    "Recent role changes created ICP confusion; reps are rebuilding target definitions from scratch.",
    "ZoomInfo and the playbooks are in, DISC and tool training scheduled — the skills are arriving before the leads.",
    "SPICED rollout is landing globally on top of everything else and needs to be reconciled with Sandler language."
  ],
  people:[
    {n:"Kyle Jacox", s:"track", ess:true, note:"Building quality lists. Working on deeper questions to lift demo-set rate."},
    {n:"Vince Arbuiso", s:"ramp", ess:true, note:"Redefining ICP around manufacturing after territory changes."},
    {n:"Kim Lamas", s:"ramp", ess:true, note:"Access issues on shared docs. Needs ZoomInfo follow-up session."},
    {n:"Marlo Franklin", s:"ramp", ess:true, note:"Commission calculator still hasn't reached her."},
    {n:"John Mathieu", s:"track", ess:true, note:"Steady."}
  ]
 },
 {
  team:"BDR / Outbound build", leader:"Harry", status:"ramp",
  metric:"Hiring up to 6", metricSub:"Quality over speed — mock calls added to interviews",
  evidence:[
    "Hiring <b>up to six proactive reps</b>, screening for culture fit and coachability with mock calls in the interview.",
    "Lead automation isn't live yet — the plan splits leads by intent and puts low-intent into automated sequences.",
    "Call volume target ramps toward <b>80–100 dials a day</b> for mid-market and SDR reps.",
    "Bridge prospect lists are covering Robert and Lance until ZoomInfo is fully implemented."
  ],
  people:[
    {n:"Lance Daughtry", s:"ramp", ess:true, note:"On bridge lists until ZoomInfo lands."},
    {n:"Robert Scott", s:"ramp", ess:true, note:"On bridge lists. Ran the feedback survey in Essentials."},
    {n:"Ken Mosier", s:"ramp", ess:true, note:"In Essentials."},
    {n:"Orion Gallagher", s:"ramp", note:"Darren coaching on next-step discipline and deal qualification."}
  ]
 }
];

const LBL={ahead:"Ahead",track:"On track",behind:"Behind",ramp:"Ramping"};
const $=id=>document.getElementById(id);
const state={leader:"",team:"",status:"",ess:false};

/* sidebar */
$('toggle').onclick=()=>{$('sidebar').classList.toggle('collapsed');$('main').classList.toggle('wide');};

/* populate selects */
[...new Set(TEAMS.map(t=>t.leader))].sort().forEach(l=>$('fLeader').add(new Option(l,l)));
function rebuildTeamSelect(){
  const cur=state.team;
  $('fTeam').length=1;
  TEAMS.filter(t=>!state.leader||t.leader===state.leader).forEach(t=>$('fTeam').add(new Option(t.team,t.team)));
  $('fTeam').value=[...$('fTeam').options].some(o=>o.value===cur)?cur:(state.team="");
}
rebuildTeamSelect();

function visiblePeople(t){
  return t.people.filter(p=>!state.ess||p.ess);
}
function match(t){
  if(state.leader&&t.leader!==state.leader)return false;
  if(state.team&&t.team!==state.team)return false;
  if(state.status&&t.status!==state.status)return false;
  if(state.ess&&!t.people.some(p=>p.ess))return false;
  return true;
}

function render(){
  const shown=TEAMS.filter(match);

  /* scoreboard counts always reflect leader + essentials scope, not the status filter */
  const scope=TEAMS.filter(t=>(!state.leader||t.leader===state.leader)&&(!state.team||t.team===state.team)&&(!state.ess||t.people.some(p=>p.ess)));
  $('score').innerHTML=['ahead','track','behind','ramp'].map(k=>{
    const n=scope.filter(t=>t.status===k).length;
    const cls={ahead:'s-ahead',track:'s-track',behind:'s-behind',ramp:'s-ramp'}[k];
    return `<button class="score-card ${cls} ${state.status===k?'on':''}" data-k="${k}">
      <div class="score-num">${n}</div><div class="score-lbl">${LBL[k]}</div></button>`;
  }).join('');
  document.querySelectorAll('.score-card').forEach(b=>b.onclick=()=>{
    state.status=state.status===b.dataset.k?"":b.dataset.k;$('fStatus').value=state.status;render();});

  if(!shown.length){$('teams').innerHTML='<div class="empty">Nothing matches those filters.</div>';return;}

  $('teams').innerHTML=shown.map(t=>{
    const ppl=visiblePeople(t);
    return `<div class="team ${t.status}">
      <div class="team-top">
        <div><div class="team-name">${t.team}</div><div class="team-lead">${t.leader}</div></div>
        <div class="pill p-${t.status}">${LBL[t.status]}</div>
      </div>
      <div class="metric"><div class="metric-num">${t.metric}</div><div class="metric-sub">${t.metricSub}</div></div>
      <ul class="evidence">${t.evidence.map(e=>`<li>${e}</li>`).join('')}</ul>
      ${ppl.length?`<div class="roster">${ppl.map(p=>
        `<span class="chip ${p.ess?'ess':''}" title="${p.note||''}"><span class="dot ${p.s}"></span>${p.n}${p.ess?' <span class="star">★</span>':''}</span>`
      ).join('')}</div>`:''}
    </div>`;
  }).join('');
}

$('fLeader').onchange=e=>{state.leader=e.target.value;rebuildTeamSelect();render();};
$('fTeam').onchange=e=>{state.team=e.target.value;render();};
$('fStatus').onchange=e=>{state.status=e.target.value;render();};
$('fEss').onchange=e=>{state.ess=e.target.checked;$('essWrap').classList.toggle('on',state.ess);render();};
$('clear').onclick=()=>{state.leader=state.team=state.status="";state.ess=false;
  $('fLeader').value="";$('fStatus').value="";$('fEss').checked=false;$('essWrap').classList.remove('on');
  rebuildTeamSelect();render();};

render();
</script>
</body>
</html>
