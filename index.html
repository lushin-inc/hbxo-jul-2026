<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubexo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fbfaf8;
  --ink:#14161a;
  --graphite-1:#272c33;
  --graphite-2:#464e59;
  --ahead-1:#12805e;  --ahead-2:#1fa97a;  --ahead-g:18,128,94;
  --track-1:#1e4fa3;  --track-2:#2f6fd0;  --track-g:30,79,163;
  --behind-1:#a32e28; --behind-2:#c9483a; --behind-g:163,46,40;
  --gold:#ffc53d;
  --hair:rgba(20,22,26,.13);
  --muted:#7c8085;
  --sans:'Inter Tight',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  --ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.wrap{max-width:1180px;margin:0 auto;padding:38px 24px 90px}
:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:4px}

/* ── filter rail ─────────────────────────────── */
.rail{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.eyebrow{font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-right:4px}
.f{font-family:var(--mono);font-size:10.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:9px 15px;border:1px solid var(--hair);background:transparent;border-radius:999px;cursor:pointer;color:var(--muted);transition:all .18s var(--ease)}
.f+.f{margin-left:5px}
.f:hover{color:var(--ink);border-color:rgba(20,22,26,.34)}
.f.on{color:#fff;border-color:transparent;transform:translateY(-1px)}
.f.on[data-lead]{background:var(--ink);box-shadow:0 6px 16px -6px rgba(20,22,26,.5)}
.f.on[data-stat=ahead]{background:var(--ahead-1);box-shadow:0 6px 16px -6px rgba(var(--ahead-g),.7)}
.f.on[data-stat=track]{background:var(--track-1);box-shadow:0 6px 16px -6px rgba(var(--track-g),.7)}
.f.on[data-stat=behind]{background:var(--behind-1);box-shadow:0 6px 16px -6px rgba(var(--behind-g),.7)}
.f.on[data-ess]{background:var(--gold);color:var(--ink);box-shadow:0 6px 16px -6px rgba(255,197,61,.85)}
.div{width:1px;height:18px;background:var(--hair);margin:0 8px}
.tally{margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:500;color:var(--muted);letter-spacing:.04em;font-variant-numeric:tabular-nums}
.tally b{color:var(--ink);font-weight:600}

/* ── tree ────────────────────────────────────── */
.tree{margin-top:52px}
.crown{display:flex;justify-content:center}
.kyle{background:linear-gradient(158deg,var(--ink),#31363f);color:#fff;border-radius:13px;padding:15px 52px;text-align:center;box-shadow:0 14px 30px -14px rgba(20,22,26,.6)}
.kyle .n{font-size:21px;font-weight:700;letter-spacing:-.02em}
.kyle .r{font-family:var(--mono);font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;opacity:.5;margin-top:3px}
.stem{height:24px;width:1px;background:var(--hair);margin:0 auto}
.branch{height:1px;background:var(--hair);width:66.66%;margin:0 auto;transform-origin:center;transition:opacity .3s var(--ease)}

.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.col{display:flex;flex-direction:column}
.riser{height:24px;width:1px;background:var(--hair);margin:0 auto;transition:opacity .3s var(--ease)}
.lead{background:linear-gradient(158deg,var(--graphite-1),var(--graphite-2));color:#fff;border:0;width:100%;border-radius:11px;padding:14px 0;font-family:var(--sans);font-size:16.5px;font-weight:600;letter-spacing:-.01em;cursor:pointer;box-shadow:0 10px 24px -14px rgba(20,22,26,.7);transition:transform .18s var(--ease),opacity .28s var(--ease),filter .28s var(--ease)}
.lead:hover{transform:translateY(-2px)}
.lead .s{color:var(--gold);font-size:12px;margin-left:3px}
.stack{display:flex;flex-direction:column;gap:13px;margin-top:15px}

/* ── team blocks: colour = status, nothing else ── */
.grp{border-radius:16px;padding:15px;cursor:pointer;border:0;text-align:left;width:100%;font-family:var(--sans);
     transition:transform .2s var(--ease),opacity .28s var(--ease),filter .28s var(--ease),box-shadow .2s var(--ease)}
.grp:hover{transform:translateY(-2px)}
.grp.ahead {background:linear-gradient(158deg,var(--ahead-1),var(--ahead-2));  box-shadow:0 16px 34px -16px rgba(var(--ahead-g),.75)}
.grp.track {background:linear-gradient(158deg,var(--track-1),var(--track-2));  box-shadow:0 16px 34px -16px rgba(var(--track-g),.7)}
.grp.behind{background:linear-gradient(158deg,var(--behind-1),var(--behind-2));box-shadow:0 16px 34px -16px rgba(var(--behind-g),.7)}
.gh{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;padding:0 3px}
.gn{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#fff;flex:1}
.gm{font-family:var(--mono);font-size:10px;font-weight:400;color:rgba(255,255,255,.6);white-space:nowrap;font-variant-numeric:tabular-nums}
.ppl{display:flex;flex-direction:column;gap:4px}
.node{display:flex;align-items:center;gap:7px;padding:9px 11px;border-radius:8px;background:rgba(255,255,255,.13);
      font-size:13.5px;font-weight:500;letter-spacing:-.005em;color:#fff;
      transition:background .16s var(--ease),opacity .24s var(--ease)}
.node:hover{background:rgba(255,255,255,.26)}
.node .nm{flex:1}
.node .s{color:var(--gold);font-size:11px}
.off{opacity:.15;filter:saturate(.1);transform:scale(.985)}
.node.off{opacity:.16;filter:none;transform:none}
.branch.off,.riser.off{opacity:.2}

/* ── tooltip ─────────────────────────────────── */
#tip{position:fixed;z-index:99;pointer-events:none;opacity:0;transform:translateY(3px);
     transition:opacity .14s var(--ease),transform .14s var(--ease);
     background:var(--ink);color:#fff;font-size:12px;font-weight:400;line-height:1.45;
     padding:8px 11px;border-radius:7px;max-width:230px;box-shadow:0 10px 26px -8px rgba(20,22,26,.55)}
#tip.show{opacity:1;transform:translateY(0)}

/* ── entrance ────────────────────────────────── */
@keyframes rise{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.anim{opacity:0;animation:rise .5s var(--ease) forwards}
@media(max-width:880px){.cols{grid-template-columns:1fr;gap:26px}.branch{display:none}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.anim{opacity:1}}
</style>
</head>
<body>
<div class="wrap">

  <div class="rail">
    <span class="eyebrow">Leader</span><span id="fLead"></span>
    <span class="div"></span>
    <span class="eyebrow">Status</span><span id="fStat"></span>
    <span class="div"></span>
    <button class="f" data-ess="1">★ Essentials</button>
    <span class="tally" id="tally"></span>
  </div>

  <div class="tree">
    <div class="crown"><div class="kyle anim"><div class="n">Kyle</div><div class="r">President</div></div></div>
    <div class="stem anim" style="animation-delay:.1s"></div>
    <div class="branch anim" id="branch" style="animation-delay:.15s"></div>
    <div class="cols" id="cols"></div>
  </div>

</div>
<div id="tip"></div>

<script>
/* ═══════════ THE ONLY THING TO EDIT ═══════════
   Structure per Hubexo_org_chart.xlsx
   s: 'ahead' | 'track' | 'behind'   — team status, drives the block colour
   e: 1                              — in Essentials, draws the ★
   note                              — hover tooltip only, never prints
   ══════════════════════════════════════════════ */
const ORG=[
 {lead:"Darren Kerr", e:1, groups:[
   {t:"Strategic Contractors", s:"behind", m:"$26K / $150K pipe", p:[
     {n:"Andrew Quintana",e:1,note:"ZoomInfo access not activated."},
     {n:"Glen Jeris",note:"No new signal this window."},
     {n:"Greg Madia",note:"Calling top 100. ZoomInfo export broken."},
     {n:"Jason Brandschain",note:"No new signal this window."},
     {n:"Jen Mack",e:1,note:"250 calls / 50 emails / 50 LinkedIn per week."},
     {n:"Josh Puvogel",e:1,note:"Custom cold outreach, documenting responses."},
     {n:"Mike Strickland",e:1,note:"Surfacing lead-quality and CRM cleanup issues."}]},
   {t:"AE Strategic", s:"track", m:"~200 AIA leads", p:[
     {n:"Brittany Moss",e:1,note:"Demo held for leadership review."},
     {n:"Josh Struletz",e:1,note:"Working AIA warm leads."},
     {n:"Mark Barretto",e:1,note:"Owns pipeline stages + ROI calculator in demos."}]},
   {t:"Strategic BPM", s:"behind", m:"ZoomInfo blocked", p:[
     {n:"Chip Kappen",note:"No new signal this window."},
     {n:"Ken Mosier",e:1,note:"In Essentials."},
     {n:"Kevin Braun",note:"ZoomInfo login verification failing."},
     {n:"Lance Daughtry",e:1,note:"Bridge lists until ZoomInfo lands."},
     {n:"Megan Sanders",note:"ZoomInfo subscription expired."},
     {n:"Orion Gallagher",note:"Darren coaching next-step discipline."},
     {n:"Robert Scott",e:1,note:"Bridge lists."}]}
 ]},
 {lead:"Craig Fuss", groups:[
   {t:"Key Accounts + Upsells", s:"ahead", m:"200% of goal", p:[
     {n:"Jon Kane",note:"$90K in two months vs $30K/mo. Only real referral network."},
     {n:"Kayla Shabahz",note:"Quest expert. In the sprint."},
     {n:"Kevin Drake",note:"API. $12.5K/mo target, 10% commission."},
     {n:"Nicole Leclair",note:"New. In the sprint."},
     {n:"Susan Young",note:"Monitor expert. In the sprint."}]},
   {t:"Alex Deloach", s:"ahead", m:"$155K closed", p:[
     {n:"Sarah",note:"Coaching on pipeline + upfront contracts."},
     {n:"Nicole Crader",e:1,note:"Prospecting ramp-up with Alex."}]}
 ]},
 {lead:"Harry", groups:[
   {t:"Contractors Mid Market", s:"ahead", m:"Momentum", p:[
     {n:"Devon Semler",e:1,note:"Closing early in ramp."},
     {n:"Joseph Shelton",e:1,note:"Documenting pre-demo qualification."},
     {n:"Michael Ciccarelli",e:1,note:"Steady."},
     {n:"Nicole Speck",e:1,note:"Steady."},
     {n:"Sabrina Brackett",e:1,note:"Referral success."}]},
   {t:"Mid Market BPM", s:"behind", m:"72% leads / 7 reps", p:[
     {n:"John Mathieu",e:1,note:"Steady."},
     {n:"Kim Lamas",e:1,note:"Access issues. Needs ZoomInfo session."},
     {n:"Kyle Jacox",e:1,note:"Building quality lists."},
     {n:"Marlo Franklin",e:1,note:"Commission calculator still not received."},
     {n:"Vince Arbuiso",e:1,note:"Redefining ICP after territory changes."}]}
 ]}
];

const $=id=>document.getElementById(id);
const S={lead:"",stat:"",team:"",ess:false};
const STATS=[["ahead","Ahead"],["track","On track"],["behind","Behind"]];
const esc=t=>(t||'').replace(/"/g,'&quot;');

$('fLead').innerHTML=ORG.map(o=>`<button class="f" data-lead="${o.lead}">${o.lead}</button>`).join('');
$('fStat').innerHTML=STATS.map(([k,v])=>`<button class="f" data-stat="${k}">${v}</button>`).join('');

let d=200;
$('cols').innerHTML=ORG.map(o=>`
  <div class="col" data-col="${o.lead}">
    <div class="riser anim" style="animation-delay:${(d+=40)}ms"></div>
    <button class="lead anim" data-lead="${o.lead}" data-ess="${o.e?1:0}" style="animation-delay:${d}ms">${o.lead}${o.e?'<span class="s">★</span>':''}</button>
    <div class="stack">
      ${o.groups.map(g=>`
      <div class="grp ${g.s} anim" data-team="${g.t}" data-stat="${g.s}" style="animation-delay:${(d+=55)}ms" tabindex="0">
        <div class="gh"><span class="gn">${g.t}</span><span class="gm">${g.m}</span></div>
        <div class="ppl">
          ${g.p.map(p=>`<div class="node" data-ess="${p.e?1:0}" data-note="${esc(p.note)}">
            <span class="nm">${p.n}</span>${p.e?'<span class="s">★</span>':''}</div>`).join('')}
        </div>
      </div>`).join('')}
    </div>
  </div>`).join('');

function apply(){
  let vis=0,tot=0;
  document.querySelectorAll('.col').forEach(c=>{
    const leadOk=!S.lead||c.dataset.col===S.lead;
    let anyGrp=false;
    c.querySelectorAll('.grp').forEach(g=>{
      const ok=leadOk&&(!S.stat||g.dataset.stat===S.stat)&&(!S.team||g.dataset.team===S.team);
      let anyP=false;
      g.querySelectorAll('.node').forEach(n=>{
        tot++;
        const pOk=ok&&(!S.ess||n.dataset.ess==='1');
        n.classList.toggle('off',!pOk);
        if(pOk){anyP=true;vis++}
      });
      const gOk=ok&&anyP;
      g.classList.toggle('off',!gOk);
      if(gOk)anyGrp=true;
    });
    const L=c.querySelector('.lead');
    tot++;
    const lOk=S.ess?(leadOk&&L.dataset.ess==='1'&&!S.stat&&!S.team):(leadOk&&anyGrp);
    if(lOk)vis++;
    L.classList.toggle('off',!lOk);
    c.querySelector('.riser').classList.toggle('off',!leadOk||!anyGrp);
  });
  document.querySelectorAll('.f').forEach(b=>{
    if(b.dataset.lead)b.classList.toggle('on',S.lead===b.dataset.lead);
    if(b.dataset.stat)b.classList.toggle('on',S.stat===b.dataset.stat);
    if(b.dataset.ess)b.classList.toggle('on',S.ess);
  });
  $('branch').classList.toggle('off',!!S.lead);
  $('tally').innerHTML=`<b>${vis}</b>&nbsp;/&nbsp;${tot}`;
}

/* the entrance animation holds opacity via fill-mode; release it so .off can dim */
let settled=false;
function settle(){if(settled)return;settled=true;
  document.querySelectorAll('.anim').forEach(el=>el.classList.remove('anim'));}
setTimeout(settle,1500);

document.addEventListener('click',e=>{
  settle();
  const b=e.target.closest('.f'), g=e.target.closest('.grp'), l=e.target.closest('.lead');
  if(b){
    if(b.dataset.lead){S.lead=S.lead===b.dataset.lead?"":b.dataset.lead;S.team=""}
    else if(b.dataset.stat){S.stat=S.stat===b.dataset.stat?"":b.dataset.stat}
    else if(b.dataset.ess){S.ess=!S.ess}
  }
  else if(l){S.lead=S.lead===l.dataset.lead?"":l.dataset.lead;S.team=""}
  else if(g){S.team=S.team===g.dataset.team?"":g.dataset.team}
  else return;
  apply();
});
document.addEventListener('keydown',e=>{
  settle();
  if(e.key==='Enter'||e.key===' '){const g=e.target.closest('.grp');
    if(g){e.preventDefault();S.team=S.team===g.dataset.team?"":g.dataset.team;apply()}}
  if(e.key==='Escape'){S.lead=S.stat=S.team="";S.ess=false;apply()}
});

/* tooltip */
const tip=$('tip');
document.addEventListener('mouseover',e=>{
  const n=e.target.closest('.node');
  if(!n||!n.dataset.note||n.classList.contains('off'))return;
  tip.textContent=n.dataset.note;
  const r=n.getBoundingClientRect();
  tip.style.left=Math.min(r.left,innerWidth-244)+'px';
  tip.style.top=(r.bottom+7)+'px';
  tip.classList.add('show');
});
document.addEventListener('mouseout',e=>{if(e.target.closest('.node'))tip.classList.remove('show')});

apply();
</script>
</body>
</html>
