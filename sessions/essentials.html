<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubexo — Essentials</title>
<style>
:root{--ink:#111;--paper:#fbfaf8;--navy:#0b2545;--blue:#2f6fd0;--gold:#e0a526;--rule:#e3ddd4;--muted:#6b6b6b;--green:#1f8a5f;
--mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:34px 22px 70px}
.brandbar{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.brand{font-weight:800;font-size:15px;letter-spacing:.22em;text-transform:uppercase}
.brand .dot{color:var(--blue)}
nav{display:flex;gap:22px}
nav a{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding-bottom:3px;border-bottom:2px solid transparent}
nav a:hover{color:var(--ink)}
nav a.on{color:var(--ink);border-bottom-color:var(--blue)}
.circuit{height:2px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) 22%,transparent 22%);position:relative;margin:12px 0 0}
.circuit::after{content:"";position:absolute;left:22%;top:-3px;width:8px;height:8px;border:2px solid var(--blue);border-radius:50%;background:var(--paper)}
.meta{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:26px 0 14px}
.meta b{color:var(--ink)}
.s{display:flex;align-items:center;gap:16px;padding:14px 16px;border:1.5px solid var(--rule);border-radius:10px;background:#fff;margin-bottom:7px}
.s.done{opacity:.42}
.s.now{background:var(--navy);color:#fff;border-color:var(--navy);padding:22px 16px;box-shadow:0 8px 24px rgba(11,37,69,.28)}
.num{min-width:34px;height:34px;border-radius:8px;background:var(--paper);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted)}
.s.done .num{border-color:var(--green);color:var(--green)}
.s.now .num{background:var(--gold);border-color:var(--gold);color:var(--navy);min-width:44px;height:44px;font-size:17px}
.t{flex:1;font-size:15.5px;font-weight:600}
.s.now .t{font-size:21px;font-weight:800;letter-spacing:-.01em}
.d{font-family:var(--mono);font-size:11px;color:var(--muted)}
.s.now .d{color:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px;margin-top:14px}
.p{border:1px solid var(--rule);border-radius:7px;padding:9px 11px;background:#fff;display:flex;justify-content:space-between;gap:8px;align-items:center}
.p .n{font-size:13.5px;font-weight:500}
.p .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand">Hubexo<span class="dot">.</span></div>
    <nav><a href="../index.html">Org</a><a href="essentials.html" class="on">Essentials</a><a href="kam-sprint.html">KAM Sprint</a></nav>
  </div>
  <div class="circuit"></div>
  <div class="meta">Session <b>4 of 9</b> &nbsp;·&nbsp; 22 incl. Darren &nbsp;·&nbsp; ends Aug 20</div>
  <div id="rail"></div>
  <div class="meta">The cohort</div>
  <div class="grid" id="grid"></div>
</div>
<script>
/* EDIT: state = 'done' | 'now' | '' */
const SESSIONS=[
 {n:1,t:"Success Triangle",d:"Jun 18",state:"done"},
 {n:2,t:"Buyer/Seller Dance",d:"Jun 25",state:"done"},
 {n:3,t:"Communication",d:"Jul 9",state:"done"},
 {n:4,t:"Creating Mutual Agreement",d:"Jul 16",state:"now"},
 {n:5,t:"Discovering Buyer's Motivations",d:"Jul 23",state:""},
 {n:6,t:"Asking Questions",d:"Jul 30",state:""},
 {n:7,t:"Investment Parameters",d:"Aug 6",state:""},
 {n:8,t:"Decision Making",d:"Aug 13",state:""},
 {n:9,t:"Closing",d:"Aug 20",state:""}
];
const COHORT=[
 ["Darren Kerr","Leader"],["Andrew Quintana","Darren"],["Brittany Moss","Darren"],
 ["Devon Semler","Harry"],["Jen Mack","Darren"],["John Mathieu","Harry"],
 ["Joseph Shelton","Harry"],["Josh Puvogel","Darren"],["Josh Struletz","Darren"],
 ["Ken Mosier","Darren"],["Kim Lamas","Harry"],["Kyle Jacox","Harry"],
 ["Lance Daughtry","Darren"],["Mark Barretto","Darren"],["Marlo Franklin","Harry"],
 ["Michael Ciccarelli","Harry"],["Mike Strickland","Darren"],["Nicole Crader","Craig"],
 ["Nicole Speck","Harry"],["Robert Scott","Darren"],["Sabrina Brackett","Harry"],
 ["Vince Arbuiso","Harry"]
];
document.getElementById('rail').innerHTML=SESSIONS.map(s=>
 `<div class="s ${s.state}"><div class="num">${s.n}</div><div class="t">${s.t}</div><div class="d">${s.d}</div></div>`).join('');
document.getElementById('grid').innerHTML=COHORT.map(([n,l])=>
 `<div class="p"><span class="n">${n}</span><span class="l">${l}</span></div>`).join('');
</script>
</body>
</html>
