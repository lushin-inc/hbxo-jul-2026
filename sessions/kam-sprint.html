<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubexo — KAM Sprint</title>
<style>
:root{--ink:#111;--paper:#fbfaf8;--navy:#0b2545;--blue:#2f6fd0;--gold:#e0a526;--rule:#e3ddd4;--muted:#6b6b6b;--green:#1f8a5f;
--mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.wrap{max-width:900px;margin:0 auto;padding:34px 22px 70px}
.brandbar{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.brand{font-weight:800;font-size:15px;letter-spacing:.22em;text-transform:uppercase}
.brand .dot{color:var(--blue)}
nav{display:flex;gap:22px}
nav a{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding-bottom:3px;border-bottom:2px solid transparent}
nav a:hover{color:var(--ink)}
nav a.on{color:var(--ink);border-bottom-color:var(--blue)}
.circuit{height:2px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) 22%,transparent 22%);position:relative;margin:12px 0 0}
.circuit::after{content:"";position:absolute;left:22%;top:-3px;width:8px;height:8px;border:2px solid var(--blue);border-radius:50%;background:var(--paper)}
.nums{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:2px;margin:26px 0 0;border:1.5px solid var(--rule);border-radius:10px;overflow:hidden;background:var(--rule)}
.nums div{background:#fff;padding:18px 16px}
.nums .v{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--green)}
.nums .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:3px}
.meta{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:34px 0 14px}
.s{display:flex;align-items:center;gap:16px;padding:16px;border:1.5px solid var(--rule);border-left:5px solid var(--blue);border-radius:10px;background:#fff;margin-bottom:7px}
.num{min-width:34px;height:34px;border-radius:8px;background:var(--paper);border:1px solid var(--rule);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--blue)}
.t{flex:1;font-size:15.5px;font-weight:600}
.d{font-family:var(--mono);font-size:11px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px}
.p{border:1px solid var(--rule);border-radius:7px;padding:11px 13px;background:#fff}
.p .n{font-size:14px;font-weight:600}
.p .r{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brandbar">
    <div class="brand">Hubexo<span class="dot">.</span></div>
    <nav><a href="../index.html">Org</a><a href="essentials.html">Essentials</a><a href="kam-sprint.html" class="on">KAM Sprint</a></nav>
  </div>
  <div class="circuit"></div>

  <div class="nums">
    <div><div class="v">200%</div><div class="k">of goal</div></div>
    <div><div class="v">$500K+</div><div class="k">upsells</div></div>
    <div><div class="v">$110K</div><div class="k">monthly target</div></div>
    <div><div class="v">4</div><div class="k">reps in sprint</div></div>
  </div>

  <div class="meta">Four sessions</div>
  <div id="cards"></div>
  <div class="meta">Who's in it</div>
  <div class="grid" id="grid"></div>
</div>
<script>
const SPRINT=[
 {n:1,t:"Product–pain matrix",d:"Wed Jul 22"},
 {n:2,t:"Prospect prioritization",d:"Wed Aug 5"},
 {n:3,t:"Messaging and outreach",d:"Wed Aug 19"},
 {n:4,t:"Referrals and intros",d:"Wed Sep 2"}
];
const ROSTER=[
 {n:"Jon Kane",r:"Construction Wire"},
 {n:"Susan Young",r:"Monitor"},
 {n:"Kayla Shabahz",r:"Quest"},
 {n:"Nicole Leclair",r:"New rep"},
 {n:"Kevin Drake",r:"API — separate track"}
];
document.getElementById('cards').innerHTML=SPRINT.map(s=>
 `<div class="s"><div class="num">${s.n}</div><div class="t">${s.t}</div><div class="d">${s.d}</div></div>`).join('');
document.getElementById('grid').innerHTML=ROSTER.map(p=>
 `<div class="p"><div class="n">${p.n}</div><div class="r">${p.r}</div></div>`).join('');
</script>
</body>
</html>
